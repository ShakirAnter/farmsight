  <style>
    /* Critical CSS for initial render */
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading screen for live preview */
    #preview-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    #preview-loader.loaded {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader-logo {
      font-size: 48px;
      font-weight: bold;
      color: #22c55e;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .loader-text {
      color: #94a3b8;
      font-size: 18px;
      margin-bottom: 30px;
    }
    
    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(34, 197, 94, 0.2);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <!-- Live Preview Loader -->
  <div id="preview-loader">
    <div class="loader-logo">🌾 FarmSight</div>
    <div class="loader-text">Loading Agricultural Management System...</div>
    <div class="loader-spinner"></div>
  </div>
  
  <div id="root"></div>
  <script type="module" src="/App.tsx"></script>
  
  <!-- Live Preview Renderer -->
  <script src="/preview-renderer.js"></script>
  
  <!-- AI Assistant Integration Script -->
  <script>
    // Make site information available for AI assistants and browsers
    window.FarmSightInfo = {
      name: "FarmSight",
      version: "2.0",
      description: "Agricultural Management System for Ugandan Farmers",
      features: [
        "Offline Support",
        "Market Prices",
        "Crop Management",
        "Farming Calendar",
        "Disease Guide",
        "Multi-language Support"
      ],
      languages: ["English", "Luganda", "Swahili"],
      currency: "UGX",
      region: "Uganda",
      developer: "Sujal Kerai",
      email: "farmsight11@gmail.com",
      project: "Senior 3 School Project - Utilization of Available Resources for Community Development",
      year: 2025,
      openAccess: true,
      requiresAuth: false
    };
    
    // Service Worker registration for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => console.log('✅ FarmSight Service Worker registered'))
          .catch(err => console.log('⚠️ Service Worker registration failed:', err));
      });
    }
  </script>
</body>
